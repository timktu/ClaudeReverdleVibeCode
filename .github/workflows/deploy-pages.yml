name: Deploy to GitHub Pages

on:
  # Build and deploy on every push to the default branch.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions needed by the GitHub-provided Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        # Derive the Pages sub-path from the repo name so `base` always matches
        # https://<owner>.github.io/<repo>/ regardless of what the repo is named.
        run: npm run build:client
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      # GitHub Pages has no server to rewrite unknown paths, so serve
      # index.html as the 404 fallback to keep client-side routing working.
      - name: Add SPA 404 fallback
        run: cp dist/public/index.html dist/public/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
